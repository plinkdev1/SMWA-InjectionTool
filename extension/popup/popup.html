<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MWA Injector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f14;
      color: #e0e0e0;
    }

    .header {
      background: linear-gradient(135deg, #9945FF 0%, #7b35d9 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 1px;
    }

    .content { padding: 14px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a24;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .toggle-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #333;
      border-radius: 24px;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .toggle-slider { background: #9945FF; }
    input:checked + .toggle-slider::before { transform: translateX(18px); }

    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a24;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .site-hostname {
      font-size: 12px;
      font-family: monospace;
      color: #14F195;
      word-break: break-all;
      max-width: 160px;
    }

    .btn-site-toggle {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-site-toggle.disable {
      background: #3a1a1a;
      color: #ff6b6b;
    }

    .btn-site-toggle.enable {
      background: #1a3a1a;
      color: #14F195;
    }

    .status-box {
      background: #1a1a24;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
    }

    .status-key { color: #888; }
    .status-val { color: #e0e0e0; font-family: monospace; }
    .status-val.ok { color: #14F195; }
    .status-val.warn { color: #FFB800; }
    .status-val.err { color: #ff6b6b; }

    .divider {
      border: none;
      border-top: 1px solid #2a2a34;
      margin: 8px 0;
    }

    .footer {
      padding: 8px 14px 12px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }

    .footer a {
      color: #9945FF;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo">◎</div>
    <div>
      <div class="header-title">MWA Injector</div>
      <div class="header-sub">Solana Mobile Wallet Adapter</div>
    </div>
  </div>

  <div class="content">

    <!-- Global enable/disable toggle -->
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Inject on all HTTPS pages</div>
        <div class="toggle-sub">Auto-registers MWA wallet on page load</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="globalToggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Per-site toggle (shows current tab's hostname) -->
    <div class="site-row" id="siteRow">
      <div>
        <div class="toggle-label" style="font-size:12px;">This site</div>
        <div class="site-hostname" id="siteHostname">—</div>
      </div>
      <button class="btn-site-toggle disable" id="siteToggleBtn">Disable</button>
    </div>

    <!-- Injection status for current tab -->
    <div class="status-box">
      <div class="status-row">
        <span class="status-key">Package</span>
        <span class="status-val">wallet-standard-mobile@0.4.4</span>
      </div>
      <div class="status-row">
        <span class="status-key">Status</span>
        <span class="status-val" id="statusVal">Checking…</span>
      </div>
      <div class="status-row">
        <span class="status-key">Wallet type</span>
        <span class="status-val" id="walletTypeVal">—</span>
      </div>
    </div>

  </div>

  <hr class="divider" />
  <div class="footer">
    <a href="https://github.com/YOUR_GITHUB_USER/mwa-injector" target="_blank">
      GitHub — MIT License
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
